<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pilotage Genius — dino coloré (test)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ---- charte Genius ---- */
    :root{
      --marine:#2E284E;--bleu:#3E3CBA;--violet:#6F6DF2;--rose:#FE005A;--vert:#00FF87;
      --ink:#2E284E;--lab:#8684A2;--ln:#E9E9F2;--paper:#F4F4FA;
      /* accent de l'app + version claire pour comparer */
      --accent:var(--bleu);          /* #3E3CBA */
      --accent-light:var(--violet);  /* #6F6DF2 */
    }
    html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);
      font-family:"Inter",system-ui,sans-serif;font-size:14px}
    .brand{max-width:1100px;margin:0 auto;padding:18px 28px 0;display:flex;align-items:center;gap:8px}
    .brand-dot{width:5px;height:5px;border-radius:50%;background:var(--bleu)}
    .brand-tool{font-family:"Archivo";font-weight:800;font-size:16px;letter-spacing:-.02em;color:var(--bleu)}
    h2.t{max-width:1100px;margin:18px auto 0;padding:0 28px;font-family:"Archivo";font-weight:700;font-size:15px;color:var(--lab)}

    .cmp{max-width:1100px;margin:14px auto 0;padding:0 28px;display:grid;gap:16px;grid-template-columns:repeat(3,1fr)}
    .cell{background:#fff;border:1px solid var(--ln);border-radius:14px;padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:12px}
    .cell .tag{font-size:12px;color:var(--lab)}
    .cell .hex{font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px;color:var(--lab)}
    .sw{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:-1px;margin-right:6px;border:1px solid rgba(0,0,0,.1)}

    /* aussi en situation réelle : la ligne de chargement de l'app, version accent */
    .real{max-width:1100px;margin:26px auto 0;padding:0 28px}
    .real .box{background:#fff;border:1px solid var(--ln);border-radius:14px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:6px}
    .real .cap{color:var(--lab);font-size:12px}
  </style>
</head>
<body>
  <div class="brand"><span class="brand-dot"></span><span class="brand-tool">Pilotage Genius</span></div>
  <h2 class="t">Comparatif couleur du dino</h2>

  <div class="cmp">
    <div class="cell">
      <dino-loader height="80" width="320"></dino-loader>
      <div class="tag">Gris d'origine</div>
      <div class="hex">défaut (#535353)</div>
    </div>
    <div class="cell">
      <dino-loader height="80" width="320" color="var(--accent)"></dino-loader>
      <div class="tag"><span class="sw" style="background:var(--accent)"></span>Accent</div>
      <div class="hex">var(--accent) = #3E3CBA</div>
    </div>
    <div class="cell">
      <dino-loader height="80" width="320" color="var(--accent-light)"></dino-loader>
      <div class="tag"><span class="sw" style="background:var(--accent-light)"></span>Accent clair</div>
      <div class="hex">var(--accent-light) = #6F6DF2</div>
    </div>
  </div>

  <div class="real">
    <div class="box">
      <dino-loader height="92" width="380" color="var(--accent)" label="Chargement du pilotage Genius…"></dino-loader>
      <div class="cap">en situation — couleur d'accent</div>
    </div>
  </div>

  <script src="./dino-loader.js?v=lut"></script>
</body>
</html>
