<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pilotage Genius — chargement (test dino)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ---- charte Genius (copiée de src-genius/client/index.css) ---- */
    :root{
      --marine:#2E284E;--bleu:#3E3CBA;
      --ink:#2E284E;--ink2:#4A4564;--lab:#8684A2;--ln:#E9E9F2;--paper:#F4F4FA;
    }
    html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);
      font-family:"Inter",system-ui,sans-serif;font-size:14px}
    .kc{background:#fff;border:1px solid var(--ln);border-radius:14px;padding:14px 16px}

    @keyframes gen-pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .gskel{background:var(--ln);border-radius:7px;animation:gen-pulse 1.3s ease-in-out infinite}
    @media (prefers-reduced-motion:reduce){.gskel{animation:none}}
    .appload-skel{max-width:1100px;margin:0 auto;padding:24px 28px}
    .gskel-h{height:26px;width:240px}
    .gskel-sub{height:13px;width:160px;margin-top:10px;opacity:.7}
    .gskel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0 18px}
    .gskel-grid .kc{display:flex;flex-direction:column}
    .gskel-lab{height:11px;width:60%}
    .gskel-val{height:26px;width:75%;margin-top:12px}
    .gskel-s{height:11px;width:50%;margin-top:12px}
    .gskel-big{height:300px;border-radius:14px}
    .appload-txt{text-align:center;color:var(--lab);font-size:13px;margin-top:22px}
    @media (max-width:760px){.gskel-grid{grid-template-columns:1fr 1fr}}

    /* en-tête de marque (pour situer qu'on est bien dans Genius) */
    .brand{max-width:1100px;margin:0 auto;padding:18px 28px 0;display:flex;align-items:center;gap:8px}
    .brand-dot{width:5px;height:5px;border-radius:50%;background:var(--bleu)}
    .brand-tool{font-family:"Archivo";font-weight:800;font-size:16px;letter-spacing:-.02em;color:var(--bleu)}

    /* le dino remplace le texte figé du cold-load */
    .appload-dino{display:flex;flex-direction:column;align-items:center;margin-top:26px;color:var(--lab)}
  </style>
</head>
<body>
  <div class="brand"><span class="brand-dot"></span><span class="brand-tool">Pilotage Genius</span></div>

  <!-- skeleton cold-load EXACT de l'app Genius (App.tsx) -->
  <div class="appload-skel" aria-hidden="true">
    <div class="gskel gskel-h"></div>
    <div class="gskel gskel-sub"></div>
    <div class="gskel-grid">
      <div class="kc"><div class="gskel gskel-lab"></div><div class="gskel gskel-val"></div><div class="gskel gskel-s"></div></div>
      <div class="kc"><div class="gskel gskel-lab"></div><div class="gskel gskel-val"></div><div class="gskel gskel-s"></div></div>
      <div class="kc"><div class="gskel gskel-lab"></div><div class="gskel gskel-val"></div><div class="gskel gskel-s"></div></div>
      <div class="kc"><div class="gskel gskel-lab"></div><div class="gskel gskel-val"></div><div class="gskel gskel-s"></div></div>
    </div>
    <div class="gskel gskel-big"></div>

    <!-- AVANT : <div class="appload-txt">Chargement du pilotage Genius…</div> -->
    <!-- APRÈS : le dino, qui anime l'attente -->
    <div class="appload-dino">
      <dino-loader height="84" width="360" label="Chargement du pilotage Genius…"></dino-loader>
    </div>
  </div>

  <script src="./dino-loader.js?v=noscore"></script>
</body>
</html>
